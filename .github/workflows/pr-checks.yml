name: PR checks

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - '.github/workflows/pr-checks.yml'

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    if: github.event.action != 'closed'
    permissions:
      contents: read
    uses: dustfeather/shared-workflows/.github/workflows/node-test.yml@v1
    with:
      run-build: true

  review:
    if: github.event.action != 'closed'
    needs: tests
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    uses: dustfeather/shared-workflows/.github/workflows/claude-code-review.yml@v1
    with:
      runner: arc-df-series-auto-skip
      path-to-bun: /usr/local/bin/bun
      path-to-claude: /usr/local/bin/claude
    secrets: inherit
