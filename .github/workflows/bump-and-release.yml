name: Build and Release Extension

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version from git tags
        id: version
        run: |
          LATEST=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          CURRENT="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${NEW} (from ${LATEST})"

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Inject version into manifest
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' src/manifest.json > tmp && mv tmp src/manifest.json

      - name: Build extension
        run: npm run build

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" > dist/release-notes.txt
          else
            echo "- Initial release" > dist/release-notes.txt
          fi

      - name: Create source zip for AMO review
        run: git archive --format=zip --prefix=series-auto-skip-source/ HEAD -o dist/source.zip

      - name: Pack Chrome extension
        run: |
          cd dist
          zip -r extension-chrome.zip . -x '*.DS_Store' 'source.zip'

      - name: Pack Firefox extension (.xpi)
        run: |
          cd dist
          zip -r extension-firefox.xpi . -x '*.DS_Store' 'source.zip' 'extension-chrome.zip'

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create tag and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/extension-chrome.zip
            dist/extension-firefox.xpi
          generate_release_notes: true

  publish-chrome:
    needs: build-and-release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Chrome Web Store
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T dist/extension-chrome.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          echo "Upload ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload failed"
            exit 1
          fi

          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')
          echo "Publish ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            if echo "$BODY" | grep -q "in review"; then
              echo "::warning::Chrome Web Store publish skipped: item is still in review"
            else
              echo "Publish failed"
              exit 1
            fi
          fi

  publish-amo:
    needs: build-and-release
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish to Mozilla Add-ons
        env:
          AMO_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          generate_jwt() {
            node -e "
              const crypto = require('crypto');
              const h = Buffer.from(JSON.stringify({alg:'HS256',typ:'JWT'})).toString('base64url');
              const now = Math.floor(Date.now()/1000);
              const p = Buffer.from(JSON.stringify({
                iss: process.env.AMO_API_KEY,
                iat: now,
                exp: now + 300,
                jti: crypto.randomUUID()
              })).toString('base64url');
              const s = crypto.createHmac('sha256', process.env.AMO_API_SECRET)
                .update(h+'.'+p).digest('base64url');
              console.log(h+'.'+p+'.'+s);
            "
          }

          AMO_BASE="https://addons.mozilla.org/api/v5"
          ADDON_ID="auto-skip@dustfeather"

          # Upload .xpi
          JWT=$(generate_jwt)
          UPLOAD_RESPONSE=$(curl -s \
            -H "Authorization: JWT $JWT" \
            -F "upload=@dist/extension-firefox.xpi" \
            -F "channel=listed" \
            "$AMO_BASE/addons/upload/")

          UPLOAD_UUID=$(echo "$UPLOAD_RESPONSE" | jq -r '.uuid')
          echo "Upload UUID: $UPLOAD_UUID"

          if [ "$UPLOAD_UUID" = "null" ] || [ -z "$UPLOAD_UUID" ]; then
            echo "Upload failed: $UPLOAD_RESPONSE"
            exit 1
          fi

          # Poll for validation (max 10 minutes)
          PROCESSED="false"
          for i in $(seq 1 60); do
            sleep 10
            JWT=$(generate_jwt)

            STATUS=$(curl -s \
              -H "Authorization: JWT $JWT" \
              "$AMO_BASE/addons/upload/$UPLOAD_UUID/")

            PROCESSED=$(echo "$STATUS" | jq -r '.processed')
            VALID=$(echo "$STATUS" | jq -r '.valid')
            echo "Poll $i: processed=$PROCESSED valid=$VALID"

            if [ "$PROCESSED" = "true" ]; then
              if [ "$VALID" = "true" ]; then
                echo "Validation passed"
                break
              else
                echo "Validation failed:"
                echo "$STATUS" | jq '.validation.messages'
                exit 1
              fi
            fi
          done

          if [ "$PROCESSED" != "true" ]; then
            echo "Validation timed out"
            exit 1
          fi

          # Create new version with source code and release notes (retry on 429)
          NOTES=$(cat dist/release-notes.txt)
          RELEASE_NOTES=$(jq -n --arg notes "$NOTES" '{"en-US": $notes}')

          for attempt in 1 2 3; do
            JWT=$(generate_jwt)
            VERSION_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: JWT $JWT" \
              -F "upload=$UPLOAD_UUID" \
              -F "source=@dist/source.zip" \
              -F "release_notes=$RELEASE_NOTES" \
              "$AMO_BASE/addons/addon/$ADDON_ID/versions/")

            HTTP_CODE=$(echo "$VERSION_RESPONSE" | tail -1)
            BODY=$(echo "$VERSION_RESPONSE" | sed '$d')
            echo "Version create attempt $attempt ($HTTP_CODE): $BODY"

            if [ "$HTTP_CODE" = "429" ]; then
              WAIT=$(echo "$BODY" | jq -r '.detail' | grep -oP '\d+' || echo "60")
              if [ "$WAIT" -gt 600 ]; then
                echo "::warning::AMO rate limit too long (${WAIT}s), skipping publish"
                exit 0
              fi
              echo "Rate limited, waiting ${WAIT}s..."
              sleep "$WAIT"
              continue
            fi
            break
          done

          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            if echo "$BODY" | grep -q "in review"; then
              echo "::warning::AMO publish skipped: previous version still in review"
            else
              echo "Version creation failed"
              exit 1
            fi
          fi
