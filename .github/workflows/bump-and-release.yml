name: Build and Release Extension

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for tags and releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed to read tags

      - name: Determine next version from tags
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="$major.$minor.$((patch + 1))"
          fi
          echo "Next version: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject version into manifest
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' src/manifest.json > tmp && mv tmp src/manifest.json

      - name: Build extension
        run: npm run build

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Pack Chrome extension
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/extension-chrome.zip . -x '*.DS_Store'

      - name: Pack Firefox extension (.xpi)
        run: |
          cd dist
          zip -r ../release/extension-firefox.xpi . -x '*.DS_Store'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            release/extension-chrome.zip
            release/extension-firefox.xpi
