name: Build and Release Extension

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write  # Required for tags and releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed to read tags

      - name: Determine next version from tags
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="$major.$minor.$((patch + 1))"
          fi
          echo "Next version: $next"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject version into manifest
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' src/manifest.json > tmp && mv tmp src/manifest.json

      - name: Build extension
        run: npm run build

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Pack Chrome extension
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/extension-chrome.zip . -x '*.DS_Store'

      - name: Pack Firefox extension (.xpi)
        run: |
          cd dist
          zip -r ../release/extension-firefox.xpi . -x '*.DS_Store'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            release/extension-chrome.zip
            release/extension-firefox.xpi

      - name: Publish to Chrome Web Store
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T release/extension-chrome.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          echo "Upload ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')
          echo "Publish ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            if echo "$BODY" | grep -q "in review"; then
              echo "::warning::Publish skipped: item currently in review"
            else
              exit 1
            fi
          fi
