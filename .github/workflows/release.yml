name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: true

jobs:
    release:
        uses: dustfeather/shared-workflows/.github/workflows/release-extension.yml@v4
        with:
            runner: arc-df-series-auto-skip
            targets: '["chrome","firefox"]'
            base-name: auto-skip
            addon-id: auto-skip@dustfeather
        secrets: inherit
