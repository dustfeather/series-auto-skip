name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Determine next version from tags
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="$major.$minor.$((patch + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (previous: ${latest:-none})"

      - name: Inject version into manifest
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' src/manifest.json > tmp && mv tmp src/manifest.json

      - run: npm run build

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Package Chrome extension
        run: cd dist && zip -r ../auto-skip-chrome-${{ steps.version.outputs.tag }}.zip .

      - name: Package Firefox extension
        run: cd dist && zip -r ../auto-skip-firefox-${{ steps.version.outputs.tag }}.xpi .

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" > release-notes.txt
          else
            echo "- Initial release" > release-notes.txt
          fi

      - name: Package source code for AMO review
        run: git archive --format=zip --prefix=source/ -o source-${{ steps.version.outputs.tag }}.zip HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            auto-skip-chrome-${{ steps.version.outputs.tag }}.zip
            auto-skip-firefox-${{ steps.version.outputs.tag }}.xpi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extensions
          path: |
            auto-skip-chrome-${{ steps.version.outputs.tag }}.zip
            auto-skip-firefox-${{ steps.version.outputs.tag }}.xpi
            source-${{ steps.version.outputs.tag }}.zip
            release-notes.txt

  publish-chrome:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extensions

      - name: Publish to Chrome Web Store
        run: |
          TOKEN_RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to get access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T auto-skip-chrome-${{ needs.build.outputs.tag }}.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")

          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          echo "Upload ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Upload failed"
            exit 1
          fi

          PUBLISH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}/publish")

          HTTP_CODE=$(echo "$PUBLISH_RESPONSE" | tail -1)
          BODY=$(echo "$PUBLISH_RESPONSE" | sed '$d')
          echo "Publish ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            if echo "$BODY" | grep -q "in review"; then
              echo "::warning::Chrome Web Store publish skipped: item is still in review"
            else
              echo "Publish failed"
              exit 1
            fi
          fi

  publish-firefox:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: extensions

      - name: Stagger AMO publish to avoid 3/min user throttle
        run: sleep $(( RANDOM % 60 ))

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Publish to Mozilla Add-ons
        env:
          AMO_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          generate_jwt() {
            node -e "
              const crypto = require('crypto');
              const h = Buffer.from(JSON.stringify({alg:'HS256',typ:'JWT'})).toString('base64url');
              const now = Math.floor(Date.now()/1000);
              const p = Buffer.from(JSON.stringify({
                iss: process.env.AMO_API_KEY,
                iat: now,
                exp: now + 300,
                jti: crypto.randomUUID()
              })).toString('base64url');
              const s = crypto.createHmac('sha256', process.env.AMO_API_SECRET)
                .update(h+'.'+p).digest('base64url');
              console.log(h+'.'+p+'.'+s);
            "
          }

          # Retry wrapper for 429 rate limits.
          # Diagnostics go to stderr so they survive $(...) capture; success
          # output (body + trailing http_code line) goes to stdout for callers.
          amo_curl() {
            local headers_file response http_code retry_after
            headers_file=$(mktemp)
            trap 'rm -f "$headers_file"' RETURN

            for attempt in 1 2 3 4 5; do
              local jwt
              jwt=$(generate_jwt)
              response=$(curl -sS -D "$headers_file" -w "\n%{http_code}" \
                             -H "Authorization: JWT $jwt" "$@" || true)
              http_code=$(echo "$response" | tail -1)

              if [ "$http_code" != "429" ]; then
                echo "$response"
                return 0
              fi

              retry_after=$(grep -i '^retry-after:' "$headers_file" \
                            | tail -1 | awk '{print $2}' | tr -d '\r')
              : "${retry_after:=60}"
              if [ "$retry_after" -gt 90 ] 2>/dev/null; then
                echo "amo_curl: retry-after ${retry_after}s exceeds 90s cap, giving up" >&2
                echo "$response" >&2
                return 1
              fi

              echo "amo_curl: 429 throttled, sleeping ${retry_after}s (attempt $attempt/5)" >&2
              sleep "$retry_after"
            done

            echo "amo_curl: exhausted 5 retries. Final response:" >&2
            echo "$response" >&2
            return 1
          }

          AMO_BASE="https://addons.mozilla.org/api/v5"
          ADDON_ID="auto-skip@dustfeather"

          # Upload .xpi
          UPLOAD_RESPONSE=$(amo_curl \
            -F "upload=@auto-skip-firefox-${{ needs.build.outputs.tag }}.xpi" \
            -F "channel=listed" \
            "$AMO_BASE/addons/upload/")
          UPLOAD_RESPONSE=$(echo "$UPLOAD_RESPONSE" | sed '$d')

          UPLOAD_UUID=$(echo "$UPLOAD_RESPONSE" | jq -r '.uuid')
          echo "Upload UUID: $UPLOAD_UUID"

          if [ "$UPLOAD_UUID" = "null" ] || [ -z "$UPLOAD_UUID" ]; then
            echo "Upload failed: $UPLOAD_RESPONSE"
            exit 1
          fi

          # Poll for validation (max 10 minutes)
          PROCESSED="false"
          for i in $(seq 1 60); do
            sleep 10
            POLL_RESPONSE=$(amo_curl "$AMO_BASE/addons/upload/$UPLOAD_UUID/")
            STATUS=$(echo "$POLL_RESPONSE" | sed '$d')

            PROCESSED=$(echo "$STATUS" | jq -r '.processed')
            VALID=$(echo "$STATUS" | jq -r '.valid')
            echo "Poll $i: processed=$PROCESSED valid=$VALID"

            if [ "$PROCESSED" = "true" ]; then
              if [ "$VALID" = "true" ]; then
                echo "Validation passed"
                break
              else
                echo "Validation failed:"
                echo "$STATUS" | jq '.validation.messages'
                exit 1
              fi
            fi
          done

          if [ "$PROCESSED" != "true" ]; then
            echo "Validation timed out"
            exit 1
          fi

          # Create new version with source code (multipart).
          # AMO API: complex/translated fields (release_notes, compatibility,
          # custom_license) cannot be set in the same multipart request as a
          # source upload — they require a separate JSON PATCH call.
          # See: https://mozilla.github.io/addons-server/topics/api/addons.html#version-sources
          VERSION_RESPONSE=$(amo_curl \
            -F "upload=$UPLOAD_UUID" \
            -F "source=@source-${{ needs.build.outputs.tag }}.zip" \
            "$AMO_BASE/addons/addon/$ADDON_ID/versions/")

          HTTP_CODE=$(echo "$VERSION_RESPONSE" | tail -1)
          BODY=$(echo "$VERSION_RESPONSE" | sed '$d')
          echo "Version create ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "200" ]; then
            if echo "$BODY" | grep -q "in review"; then
              echo "::warning::AMO publish skipped: previous version still in review"
              exit 0
            fi
            echo "Version creation failed"
            exit 1
          fi

          VERSION_ID=$(echo "$BODY" | jq -r '.id')
          if [ "$VERSION_ID" = "null" ] || [ -z "$VERSION_ID" ]; then
            echo "Could not parse version id from create response; skipping release_notes PATCH"
            exit 0
          fi

          # PATCH release_notes as JSON (translatable field requires {lang: value})
          NOTES=$(cat release-notes.txt)
          PATCH_BODY=$(jq -n --arg notes "$NOTES" '{release_notes: {"en-US": $notes}}')

          # generate_jwt is available from earlier in the script
          JWT=$(generate_jwt)
          PATCH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: JWT $JWT" \
            -H "Content-Type: application/json" \
            -X PATCH \
            -d "$PATCH_BODY" \
            "$AMO_BASE/addons/addon/$ADDON_ID/versions/$VERSION_ID/")

          PATCH_CODE=$(echo "$PATCH_RESPONSE" | tail -1)
          PATCH_BODY_RESP=$(echo "$PATCH_RESPONSE" | sed '$d')
          echo "Release-notes PATCH ($PATCH_CODE): $PATCH_BODY_RESP"

          if [ "$PATCH_CODE" != "200" ]; then
            echo "::warning::Failed to set release notes (version was still created)"
          fi
